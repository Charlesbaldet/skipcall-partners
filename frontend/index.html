<!DOCTYPE html>
<html lang="fr">
  <head>

         exact path-qualified canonical. -->

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="RefBoost — Gestion de programme partenaires" />
    <meta property="og:description" content="RefBoost est la plateforme SaaS de gestion de programme partenaires et d'apporteurs d'affaires. Automatisez le suivi des referrals, commissions et performance." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://refboost.io" />

    <meta name="twitter:image" content="https://refboost.io/og-image.png" />

    <!-- Performance hints for the Railway API -->
    <link rel="preconnect" href="https://skipcall-partners-production.up.railway.app" />
    <link rel="dns-prefetch" href="https://skipcall-partners-production.up.railway.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Organization schema — identity of the publisher, reused by
         every Article schema downstream. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RefBoost",
      "url": "https://refboost.io",
      "logo": "https://refboost.io/apple-touch-icon.png",
      "description": "Plateforme de gestion de programme d'apporteurs d'affaires et partenaires"
    }
    </script>

    <!-- SoftwareApplication schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RefBoost",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Plateforme SaaS de gestion de programme partenaires et d'apporteurs d'affaires",
      "url": "https://refboost.io",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "79",
        "priceCurrency": "EUR",
        "offerCount": "3"
      },
      "author": {
        "@type": "Organization",
        "name": "RefBoost",
        "url": "https://refboost.io"
      }
    }
    </script>

    <!-- Google Analytics 4 — only fires page_view on public pages; app
         pages (dashboard, referrals, etc.) stay untracked for privacy. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJY1N13L2S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MJY1N13L2S', { 'send_page_view': false });

      var publicPaths = ['/', '/blog', '/pricing', '/marketplace', '/login', '/signup'];
      var path = window.location.pathname;
      var isPublic = publicPaths.indexOf(path) !== -1 || path.indexOf('/blog/') === 0;
      if (isPublic) {
        gtag('event', 'page_view');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- No-JS fallback for crawlers that don't execute JavaScript.
         Lists the key public routes so they still get indexed
         via the sitemap even when the SPA can't hydrate. -->

      <p>Ce site utilise JavaScript pour afficher son contenu. Activez JavaScript pour une expérience complète.</p>
