    <meta name="description" content="RefBoost est la plateforme SaaS de gestion de programme partenaires et d'apporteurs d'affaires. Automatisez referrals, commissions et performance en 5 min." />

    <!-- No static canonical here on purpose. react-helmet-async sets
         a per-route <link rel="canonical"> from App.jsx's
         <RouteCanonical/>, with each public page overriding it via
         its own Helmet. A static root-level canonical would make
         crawlers see TWO canonicals (static homepage + Helmet's) and
         pick the wrong one, collapsing every URL to /. -->

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Twitter. og:title / og:description / og:url and
         twitter:* are rewritten per route by frontend/middleware.js
         (Edge) and by react-helmet-async on the client. These stay
         as homepage defaults — they'll be replaced, not duplicated,
         on matched routes. og:image is a site-wide default. -->
    <meta property="og:title" content="RefBoost — Gestion de programme partenaires B2B" />
    <meta property="og:description" content="RefBoost est la plateforme SaaS de gestion de programme partenaires et d'apporteurs d'affaires. Automatisez referrals, commissions et performance en 5 min." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://refboost.io/" />
    <meta property="og:site_name" content="RefBoost" />
    <meta property="og:image" content="https://refboost.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RefBoost — Gestion de programme partenaires B2B" />
    <meta name="twitter:description" content="RefBoost est la plateforme SaaS de gestion de programme partenaires et d'apporteurs d'affaires. Automatisez referrals, commissions et performance en 5 min." />
    <meta name="twitter:image" content="https://refboost.io/og-image.png" />

    <!-- Performance hints for the Railway API -->
    <link rel="preconnect" href="https://skipcall-partners-production.up.railway.app" />
    <link rel="dns-prefetch" href="https://skipcall-partners-production.up.railway.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Organization schema — identity of the publisher, reused by
         every Article schema downstream. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RefBoost",
      "url": "https://refboost.io",
      "logo": {
        "@type": "ImageObject",
        "url": "https://refboost.io/apple-touch-icon.png",
        "width": 180,
        "height": 180
      },
      "description": "Plateforme de gestion de programme d'apporteurs d'affaires et partenaires",
      "sameAs": [
        "https://refboost.io"
      ]
    }
    </script>

    <!-- SoftwareApplication schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RefBoost",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Plateforme SaaS de gestion de programme partenaires et d'apporteurs d'affaires",
      "url": "https://refboost.io",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "79",
        "priceCurrency": "EUR",
        "offerCount": "3"
      },
      "author": {
        "@type": "Organization",
        "name": "RefBoost",
        "url": "https://refboost.io"
      }
    }
    </script>

    <!-- Google Analytics 4 — only fires page_view on public pages; app
         pages (dashboard, referrals, etc.) stay untracked for privacy. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJY1N13L2S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MJY1N13L2S', { 'send_page_view': false });

      var publicPaths = ['/', '/blog', '/pricing', '/marketplace', '/login', '/signup'];
      var path = window.location.pathname;
      var isPublic = publicPaths.indexOf(path) !== -1 || path.indexOf('/blog/') === 0;
      if (isPublic) {
        gtag('event', 'page_view');
      }
    </script>
  </head>

         hydrate. Every public route lives here so no page ends up
